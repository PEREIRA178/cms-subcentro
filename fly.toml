# fly.toml app configuration file generated for cms-plazareal on 2026-04-16T17:53:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'cms-plazareal'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "pb_data"
  destination = "/app/pb_data"