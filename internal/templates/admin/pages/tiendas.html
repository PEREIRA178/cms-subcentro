<style>
@keyframes spin{to{transform:rotate(360deg)}}
.t-filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.t-filter-bar input,.t-filter-bar select{
  padding:8px 12px;border:1.5px solid var(--md-outline-variant);border-radius:var(--r-md);
  font-family:var(--font-body);font-size:13px;color:var(--md-on-surface);background:var(--md-surface);
  outline:none;transition:border-color 150ms;
}
.t-filter-bar input:focus,.t-filter-bar select:focus{border-color:var(--md-primary)}
</style>

<header class="topbar">
  <h1 class="topbar-title">Tiendas</h1>
  <div class="topbar-actions">
    <a href="/buscador-tiendas.html" target="_blank" class="topbar-btn topbar-btn-outline">
      <span class="material-symbols-outlined" style="font-size:16px">open_in_new</span> Ver web
    </a>
    <button class="topbar-btn topbar-btn-outline"
      hx-get="/admin/tiendas/bulk" hx-target="#modal-container" hx-swap="innerHTML">
      <span class="material-symbols-outlined" style="font-size:16px">upload_file</span> Carga masiva
    </button>
    <button class="topbar-btn topbar-btn-primary"
      hx-get="/admin/tiendas/new" hx-target="#modal-container" hx-swap="innerHTML">
      <span class="material-symbols-outlined" style="font-size:16px">add</span> Nueva tienda
    </button>
  </div>
</header>

<div class="content">
  <div class="card" style="margin-bottom:20px;padding:16px 24px">
    <div class="t-filter-bar">
      <input id="t-search" type="text" placeholder="Buscar por nombre..." style="flex:1;min-width:200px"
        oninput="filterTiendaRows()"/>
      <select id="t-cat" onchange="filterTiendaRows()">
        <option value="">Todas las categorías</option>
        <option value="tiendas">Tiendas & Moda</option>
        <option value="restaurantes">Restaurantes</option>
        <option value="farmacias">Farmacias</option>
        <option value="salud">Salud & Belleza</option>
        <option value="tecnologia">Tecnología</option>
        <option value="servicios">Servicios</option>
      </select>
      <select id="t-status" onchange="filterTiendaRows()">
        <option value="">Todos los estados</option>
        <option value="publicado">Publicado</option>
        <option value="borrador">Borrador</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Listado</h2>
      <span id="t-count" style="font-size:13px;color:var(--md-outline)"></span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Nivel</th>
            <th>Local</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tiendas-tbody"
          hx-get="/admin/tiendas?fragment=rows"
          hx-trigger="load, tiendasUpdated from:body"
          hx-swap="innerHTML">
          <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--md-outline)">
            <div style="width:18px;height:18px;border:2px solid var(--md-primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px"></div>
            Cargando...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
function filterTiendaRows() {
  var q = (document.getElementById('t-search').value || '').toLowerCase();
  var cat = (document.getElementById('t-cat').value || '').toLowerCase();
  var st = (document.getElementById('t-status').value || '').toLowerCase();
  var rows = document.querySelectorAll('#tiendas-tbody tr:not(.empty-row)');
  var visible = 0;
  rows.forEach(function(row) {
    var text = row.textContent.toLowerCase();
    var show = (!q || text.includes(q)) && (!cat || text.includes(cat)) && (!st || text.includes(st));
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  var cnt = document.getElementById('t-count');
  if (cnt) cnt.textContent = visible > 0 ? (visible + ' tienda' + (visible !== 1 ? 's' : '')) : '';
}
var _tbody = document.getElementById('tiendas-tbody');
if (_tbody) {
  _tbody.addEventListener('htmx:afterSwap', filterTiendaRows);
  // Explicit load in case hx-trigger="load" doesn't fire after HTMX content swap
  if (!_tbody.dataset.loaded) {
    _tbody.dataset.loaded = '1';
    htmx.ajax('GET', '/admin/tiendas?fragment=rows', {target: '#tiendas-tbody', swap: 'innerHTML'});
  }
}
</script>
