<!-- Propiedades admin panel — cargado via HTMX en #main-content -->
<style>
.prop-filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.prop-filter-bar input,.prop-filter-bar select{
  padding:8px 12px;border:1.5px solid var(--md-outline-variant);border-radius:var(--r-md);
  font-family:var(--font-body);font-size:13px;color:var(--md-on-surface);background:var(--md-surface);
  outline:none;transition:border-color 150ms;
}
.prop-filter-bar input:focus,.prop-filter-bar select:focus{border-color:var(--md-primary)}
</style>

<header class="topbar">
  <h1 class="topbar-title">Propiedades</h1>
  <div class="topbar-actions">
    <a href="/propiedades.html" target="_blank" class="topbar-btn topbar-btn-outline">
      <span class="material-symbols-outlined" style="font-size:16px">open_in_new</span> Ver web
    </a>
    <button class="topbar-btn topbar-btn-primary"
      hx-get="/admin/propiedades/new" hx-target="#modal-container" hx-swap="innerHTML">
      <span class="material-symbols-outlined" style="font-size:16px">add</span> Nueva propiedad
    </button>
  </div>
</header>

<div class="content">
  <!-- Filtros rápidos -->
  <div class="card" style="margin-bottom:20px;padding:16px 24px">
    <div class="prop-filter-bar">
      <input id="prop-search" type="text" placeholder="Buscar por título o comuna..." style="flex:1;min-width:200px"
        oninput="filterPropRows()"/>
      <select id="prop-op" onchange="filterPropRows()">
        <option value="">Todas las operaciones</option>
        <option value="Venta">Venta</option>
        <option value="Arriendo">Arriendo</option>
      </select>
      <select id="prop-status" onchange="filterPropRows()">
        <option value="">Todos los estados</option>
        <option value="publicado">Publicado</option>
        <option value="borrador">Borrador</option>
        <option value="reservada">Reservada</option>
        <option value="vendida">Vendida</option>
        <option value="arrendada">Arrendada</option>
      </select>
    </div>
  </div>

  <!-- Tabla de propiedades -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Listado</h2>
      <span id="prop-count" style="font-size:13px;color:var(--md-outline)"></span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Título</th>
            <th>Tipo</th>
            <th>Operación</th>
            <th>Comuna</th>
            <th>Precio</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="prop-tbody"
          hx-get="/admin/propiedades?fragment=rows"
          hx-trigger="load, propUpdated from:body"
          hx-swap="innerHTML">
          <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--md-outline)">
            <div style="width:18px;height:18px;border:2px solid var(--md-primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px"></div>
            Cargando...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
function filterPropRows() {
  var q = (document.getElementById('prop-search').value || '').toLowerCase();
  var op = (document.getElementById('prop-op').value || '').toLowerCase();
  var st = (document.getElementById('prop-status').value || '').toLowerCase();
  var rows = document.querySelectorAll('#prop-tbody tr:not(.empty-row)');
  var visible = 0;
  rows.forEach(function(row) {
    var text = row.textContent.toLowerCase();
    var matchQ = !q || text.includes(q);
    var matchOp = !op || text.includes(op);
    var matchSt = !st || text.includes(st);
    var show = matchQ && matchOp && matchSt;
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  var cnt = document.getElementById('prop-count');
  if (cnt) cnt.textContent = visible > 0 ? (visible + ' propiedad' + (visible !== 1 ? 'es' : '')) : '';
}

// Update count after HTMX loads rows
document.getElementById('prop-tbody').addEventListener('htmx:afterSwap', function() {
  filterPropRows();
});
</script>
